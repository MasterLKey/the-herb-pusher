services:
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    working_dir: /app/apps/web
    command: /app/node_modules/.bin/tsx migrate.mjs
    environment:
      NODE_ENV: production
      CI: "1"
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      MEILISEARCH_HOST: http://search:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MEILISEARCH_HOST: http://search:7700
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      MAILERLITE_API_KEY: ${MAILERLITE_API_KEY:-}
      MAILERLITE_GROUP_ID: ${MAILERLITE_GROUP_ID:-}
      PLAUSIBLE_SCRIPT_URL: ${PLAUSIBLE_SCRIPT_URL:-}
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      search:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "herb_pusher_user", "-d", "herb_pusher"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  search:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  pg_data:
  meili_data:
